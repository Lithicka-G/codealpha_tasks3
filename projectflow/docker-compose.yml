version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: projectflow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: projectflow
    networks:
      - projectflow-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projectflow-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/projectflow
      JWT_SECRET: supersecretjwtkey_change_this_in_production_please
      JWT_EXPIRE: 7d
      NODE_ENV: production
      CLIENT_URL: http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - projectflow-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projectflow-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - projectflow-net

volumes:
  mongo_data:

networks:
  projectflow-net:
    driver: bridge
